name: Goal Video Bot

# Si attiva SOLO quando LiveScore_JR rileva un gol (repository_dispatch).
on:
  repository_dispatch:
    types: [goal_scored]

permissions:
  contents: read

jobs:
  send-goal-video:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Send goal video
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO_GOALS: ${{ secrets.TELEGRAM_TO_GOALS }}
          SCORER: ${{ github.event.client_payload.scorer }}
          HOME_N: ${{ github.event.client_payload.home_n }}
          AWAY_N: ${{ github.event.client_payload.away_n }}
          G_HOME: ${{ github.event.client_payload.g_home }}
          G_AWAY: ${{ github.event.client_payload.g_away }}
          MINUTE: ${{ github.event.client_payload.minute }}
          GOAL_SEARCH_TIMEOUT: "480"
          SEND_TEXT_FALLBACK: "1"
        run: python video_goal.py
