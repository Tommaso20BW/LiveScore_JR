name: Juventus Live Score
on:
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: juve-live-bot
  cancel-in-progress: false
jobs:
  run-live:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa librerie e Playwright
        run: |
          python -m pip install --upgrade pip
          pip install requests pynacl playwright Pillow
          playwright install chromium --with-deps

      - name: Avvia Juventus Live Score
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python test.py
