name: Test ESPN - keyEvents e commentary Juventus

on:
  workflow_dispatch:

jobs:
  test-juve-events:
    runs-on: ubuntu-latest
    steps:
      - name: Dump keyEvents, commentary e boxscore
        run: |
          python3 << 'EOF'
          import urllib.request, json, time

          SLUGS = [
              "ita.1", "ita.coppa_italia", "uefa.champions",
              "uefa.europa", "ita.super_cup", "fifa.cwc",
              "conmebol.libertadores",
          ]

          juve_event = None
          juve_slug  = None

          for slug in SLUGS:
              try:
                  url = f"https://site.api.espn.com/apis/site/v2/sports/soccer/{slug}/scoreboard"
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=8) as r:
                      data = json.load(r)
                  for e in data.get("events", []):
                      comps = e.get("competitions", [{}])[0]
                      teams = comps.get("competitors", [])
                      if any("Juventus" in t["team"]["displayName"] for t in teams):
                          juve_event = e
                          juve_slug = slug
                          break
              except: pass
              if juve_event: break
              time.sleep(0.2)

          if not juve_event:
              print("Nessuna partita Juventus trovata oggi. Uso event ID fisso dell'ultima (737158)...")
              juve_slug = "ita.1"
              eid = "737158"
          else:
              eid = juve_event["id"]
              print(f"Trovata: {juve_slug} / {eid}")

          sum_url = f"https://site.api.espn.com/apis/site/v2/sports/soccer/{juve_slug}/summary?event={eid}"
          req = urllib.request.Request(sum_url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=10) as r:
              summary = json.load(r)

          # ── keyEvents ────────────────────────────────────────────────────
          key_events = summary.get("keyEvents", [])
          print(f"\n{'='*60}")
          print(f"KEY EVENTS ({len(key_events)} totali):")
          print(f"{'='*60}")
          for i, ke in enumerate(key_events[:20]):
              print(f"\n--- keyEvent [{i}] ---")
              print(json.dumps(ke, indent=2, ensure_ascii=False)[:600])

          # ── commentary ───────────────────────────────────────────────────
          commentary = summary.get("commentary", [])
          print(f"\n{'='*60}")
          print(f"COMMENTARY ({len(commentary)} entries):")
          print(f"{'='*60}")
          for i, c in enumerate(commentary[:10]):
              print(f"\n--- commentary [{i}] ---")
              print(json.dumps(c, indent=2, ensure_ascii=False)[:400])

          # ── boxscore ─────────────────────────────────────────────────────
          boxscore = summary.get("boxscore", {})
          print(f"\n{'='*60}")
          print(f"BOXSCORE chiavi: {list(boxscore.keys())}")
          players = boxscore.get("players", [])
          print(f"Players entries: {len(players)}")
          if players:
              print(f"Chiavi players[0]: {list(players[0].keys())}")
              stats_cats = players[0].get("statistics", [])
              print(f"Stats categories: {[c.get('name') for c in stats_cats]}")
              if stats_cats:
                  print(f"\nPrima categoria raw:")
                  print(json.dumps(stats_cats[0], indent=2, ensure_ascii=False)[:800])

          teams_bs = boxscore.get("teams", [])
          print(f"\nTeams in boxscore: {len(teams_bs)}")
          if teams_bs:
              print(f"Chiavi teams[0]: {list(teams_bs[0].keys())}")
              t_stats = teams_bs[0].get("statistics", [])
              print(f"\nTeam statistics ({len(t_stats)} voci):")
              for s in t_stats:
                  print(f"  {s.get('name','?'):30} = {s.get('displayValue','?'):10} (label: {s.get('label','?')})")
          EOF
