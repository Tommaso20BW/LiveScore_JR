name: Test ESPN - Boca Libertadores Live

on:
  workflow_dispatch:

jobs:
  test-boca-libertadores:
    runs-on: ubuntu-latest
    steps:

      - name: Scoreboard Libertadores + cerca Boca
        run: |
          python3 << 'EOF'
          import urllib.request, json

          url = "https://site.api.espn.com/apis/site/v2/sports/soccer/conmebol.libertadores/scoreboard"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req) as r:
              data = json.load(r)

          events = data.get("events", [])
          print(f"Partite Libertadores oggi: {len(events)}\n")

          boca_event = None
          for e in events:
              comps = e.get("competitions", [{}])[0]
              teams = comps.get("competitors", [])
              names = [t["team"]["displayName"] for t in teams]
              scores = [t.get("score", "?") for t in teams]
              state = e["status"]["type"]["state"]
              desc = e["status"]["type"]["description"]
              clock = e["status"].get("displayClock", "")
              date = e.get("date", "")
              boca = any("Boca" in n for n in names)
              tag = " ← BOCA!" if boca else ""
              print(f"[{state}] {names[0]} {scores[0]} - {scores[1]} {names[1]} | {desc} {clock} | {date}{tag}")
              if boca:
                  boca_event = e

          if not boca_event:
              print("\nBoca non in campo oggi su Libertadores.")
              exit(0)

          event_id = boca_event["id"]
          comps    = boca_event.get("competitions", [{}])[0]
          teams    = comps.get("competitors", [])
          names    = [t["team"]["displayName"] for t in teams]
          scores   = [t.get("score", "0") for t in teams]
          state    = boca_event["status"]["type"]["state"]
          desc     = boca_event["status"]["type"]["description"]
          clock    = boca_event["status"].get("displayClock", "")

          print(f"\n{'='*55}")
          print(f"  {names[0]}  {scores[0]} - {scores[1]}  {names[1]}")
          print(f"  {desc} {clock}  (event_id: {event_id})")
          print(f"{'='*55}")

          sum_url = f"https://site.api.espn.com/apis/site/v2/sports/soccer/conmebol.libertadores/summary?event={event_id}"
          req2 = urllib.request.Request(sum_url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req2) as r2:
              summary = json.load(r2)

          print(f"\nChiavi summary disponibili: {list(summary.keys())}")

          plays = summary.get("plays", [])
          print(f"\nTotale plays: {len(plays)}")
          if plays:
              print("Ultimi 15 eventi:")
              for p in plays[-15:]:
                  clock_p = p.get("clock", {}).get("displayValue", "?'")
                  ptype   = p.get("type", {}).get("text", "?")
                  text    = p.get("text", "")
                  home_s  = p.get("homeScore", "")
                  away_s  = p.get("awayScore", "")
                  score_s = f"[{home_s}-{away_s}]" if home_s != "" else ""
                  goal    = "⚽ " if p.get("scoringPlay") else "   "
                  print(f"  {goal}{clock_p:>6} | {ptype:<20} | {text} {score_s}")

          scoring = summary.get("scoringPlays", [])
          if scoring:
              print(f"\nGol segnati ({len(scoring)}):")
              for g in scoring:
                  clock_g = g.get("clock", {}).get("displayValue", "?'")
                  text_g  = g.get("text", "")
                  home_s  = g.get("homeScore", "")
                  away_s  = g.get("awayScore", "")
                  print(f"  ⚽ {clock_g:>6} | {text_g} [{home_s}-{away_s}]")

          if plays:
              print(f"\nStruttura play raw (primo elemento):")
              print(json.dumps(plays[0], indent=2))
          EOF
