name: Juventus Live Score

# Usiamo il contesto globale dell'execution per aggiornare il nome
run-name: ${{ inputs.custom_run_name || 'Recupero info partita...' }}

on:
  workflow_dispatch:
    inputs:
      # Un input "invisibile" che serve a GitHub per ricevere il nome da Python
      custom_run_name:
        description: 'Non modificare, gestito automaticamente dal bot'
        required: false
        default: ''

permissions:
  contents: write
  actions: write # Necessario per permettere allo script di rinominare il run corrente

concurrency:
  group: juve-live-bot
  cancel-in-progress: false

jobs:
  run-live:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      # Configurato subito per permettere a Python di sovrascrivere tempestivamente il run-name
      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install requests pynacl

      - name: Avvia Juventus Live Score e Invio Grafica
        env:
          FOOTBALL_API_KEY: ${{ secrets.API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Passiamo il token di sistema che serve a Python per fare la chiamata API a GitHub
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mantiene traccia di un eventuale trigger automatico per solo refresh token
          ONLY_REFRESH_TOKEN: ${{ github.event.inputs.ONLY_REFRESH_TOKEN }} 
        run: python juve_bot.py
