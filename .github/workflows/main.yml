name: Juventus Live Score

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: juve-live-bot
  cancel-in-progress: false

jobs:
  run-live:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Avvia Juventus Live Score e Invio Grafica
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
        run: python juve_bot.py

      - name: 🔄 Salva i token Canva aggiornati su GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add canva_tokens.json
          git commit -m "🔄 Aggiornamento automatico Token Canva [Skip CI]" || echo "Nessun cambio nei token"
          git push
