name: Juve Bot – SofaScore Live

on:
  workflow_dispatch:

jobs:
  live-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 200       # ~3h20min: copre partita + supplementari + rigori

    env:
      TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO:         ${{ secrets.TELEGRAM_TO }}
      TEAM_ID:             ${{ secrets.TEAM_ID }}          # SofaScore team ID (Juventus = 2697)
      GH_PAT:              ${{ secrets.GH_PAT }}
      GITHUB_REPOSITORY:   ${{ github.repository }}
      GIST_ID:             ${{ secrets.GIST_ID }}
      CANVA_CLIENT_ID:     ${{ secrets.CANVA_CLIENT_ID }}
      CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
      CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze Python
        run: |
          pip install --upgrade pip
          pip install requests pillow pynacl playwright

      - name: Installa browser Playwright (Firefox)
        run: |
          # Installa SOLO Firefox per tenere il build leggero e veloce
          python -m playwright install firefox
          python -m playwright install-deps firefox

      - name: Avvia il bot
        run: python -u juve_bot_sofascore.py
