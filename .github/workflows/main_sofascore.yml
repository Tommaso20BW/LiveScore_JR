name: Juventus Live Score - SofaScore

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Team ID SofaScore (Juventus: 2697)'
        required: false
        default: '2697'

permissions:
  contents: write

concurrency:
  group: juve-live-bot
  cancel-in-progress: false

jobs:
  live-score:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pillow pynacl playwright
          playwright install firefox
          playwright install-deps firefox

      - name: Run Live Score Bot
        env:
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO:          ${{ secrets.TELEGRAM_TO }}
          GH_PAT:               ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GIST_ID:              ${{ secrets.GIST_ID }}
          CANVA_CLIENT_ID:      ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET:  ${{ secrets.CANVA_CLIENT_SECRET }}
          CANVA_REFRESH_TOKEN:  ${{ secrets.CANVA_REFRESH_TOKEN }}
          TEAM_ID:              ${{ github.event.inputs.team_id || '2697' }}
        run: python -u juve_bot_sofascore.py
