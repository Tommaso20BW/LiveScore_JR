name: Test SofaScore API

on:
  workflow_dispatch:  # avvio manuale dal pulsante "Run workflow"

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Test SofaScore - eventi live football
        run: |
          echo "=== SofaScore live football ==="
          curl -s -o response.json -w "HTTP Status: %{http_code}\n" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            -H "Referer: https://www.sofascore.com/" \
            "https://www.sofascore.com/api/v1/sport/football/events/live"
          
          echo "--- Risposta (primi 500 caratteri) ---"
          cat response.json | head -c 500
          
          echo ""
          echo "--- Numero eventi live ---"
          cat response.json | python3 -c "
          import json,sys
          try:
            data = json.load(sys.stdin)
            events = data.get('events', [])
            print(f'Partite live: {len(events)}')
            for e in events[:3]:
              home = e['homeTeam']['name']
              away = e['awayTeam']['name']
              status = e.get('status',{}).get('description','?')
              print(f'  {home} vs {away} [{status}]')
          except Exception as ex:
            print(f'Errore parsing JSON: {ex}')
          "

      - name: Test ESPN - Serie A
        run: |
          echo "=== ESPN Serie A ==="
          curl -s -o espn.json -w "HTTP Status: %{http_code}\n" \
            "https://site.api.espn.com/apis/site/v2/sports/soccer/ita.1/scoreboard"
          
          cat espn.json | python3 -c "
          import json,sys
          try:
            data = json.load(sys.stdin)
            events = data.get('events', [])
            live = [e for e in events if e.get('status',{}).get('type',{}).get('state') == 'in']
            print(f'Partite oggi: {len(events)}, live: {len(live)}')
            for e in events[:3]:
              name = e.get('name','?')
              status = e['status']['type']['description']
              print(f'  {name} [{status}]')
          except Exception as ex:
            print(f'Errore parsing JSON: {ex}')
          "

      - name: Test ESPN - Champions League
        run: |
          echo "=== ESPN Champions League ==="
          curl -s -w "HTTP Status: %{http_code}\n" \
            "https://site.api.espn.com/apis/site/v2/sports/soccer/uefa.champions/scoreboard" \
            | python3 -c "
          import json,sys
          try:
            data = json.load(sys.stdin)
            events = data.get('events', [])
            print(f'Partite: {len(events)}')
          except: print('Errore o risposta non JSON')
          "
