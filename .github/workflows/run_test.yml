name: Test Canva Bot Offline

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permette di far partire il test manualmente con un click

jobs:
  run-bot-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Scarica il codice della repository sul server di GitHub
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Configura Python sul server di GitHub
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    # 3. Installa Pillow e Requests sul server di GitHub
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Esegue lo script Python iniettando i "Secrets" di GitHub
    - name: Execute Test Script
      env:
        CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
        CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
        CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}
      run: python test_canva.py

    # 5. Salva l'immagine creata come "Artefatto" scaricabile da GitHub
    - name: Upload Generated Image
      uses: actions/upload-artifact@v4
      with:
        name: grafica-generata-juventus
        path: assets/OUTPUT_*.jpg
        if-no-files-found: warn
