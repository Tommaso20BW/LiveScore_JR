name: Test Canva Bot Offline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Test Script
      env:
        CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
        CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
        CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}
        GITHUB_PAT: ${{ secrets.GH_PAT }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: python test_canva.py

    - name: Upload Generated Image
      uses: actions/upload-artifact@v4
      with:
        name: grafica-generata-juventus
        path: assets/OUTPUT_*.jpg
        if-no-files-found: warn
