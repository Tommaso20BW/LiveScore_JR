name: Juventus Live Score - ESPN
 
on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Team ID ESPN (Juventus: 111)'
        required: false
        default: '111'
      channel:
        description: 'Canale Telegram'
        required: true
        default: 'Juventus Reborn'
        type: choice
        options:
          - Juventus Reborn
          - Test JR

permissions:
  actions: write
  contents: write

concurrency:
  group: juve-live-bot
  cancel-in-progress: false
 
jobs:
  live-score:
    runs-on: ubuntu-latest
    timeout-minutes: 240
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
 
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
 
      - name: Run Live Score Bot
        env:
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO:          ${{ github.event.inputs.channel == 'Test JR' && secrets.TELEGRAM_TO_TEST || secrets.TELEGRAM_TO }}
          GH_PAT:               ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GIST_ID:              ${{ secrets.GIST_ID }}
          CANVA_CLIENT_ID:      ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET:  ${{ secrets.CANVA_CLIENT_SECRET }}
          CANVA_REFRESH_TOKEN:  ${{ secrets.CANVA_REFRESH_TOKEN }}
          TEAM_ID:              ${{ github.event.inputs.team_id || '111' }}
        run: python -u juve_bot_espn.py

      - name: Pulisci la cronologia dei run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: "0"   # 0 = cancella TUTTI i run precedenti; resta visibile solo quello in corso
                      # (un run non puo' cancellare se' stesso mentre gira: limite di GitHub)
        run: |
          # Cancella i run COMPLETATI di questo stesso workflow,
          # tenendo solo gli ultimi $KEEP.
          gh api "repos/${{ github.repository }}/actions/workflows/main_espn.yml/runs?status=completed&per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .['"$KEEP"':] | .[].id' |
          while read -r RUN_ID; do
            echo "Elimino run $RUN_ID"
            gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$RUN_ID" || true
          done
          echo "Pulizia completata."
