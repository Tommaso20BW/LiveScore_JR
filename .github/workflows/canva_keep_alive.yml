name: Canva Token Keep-Alive

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: juve-canva-keepalive
  cancel-in-progress: true

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Per il solo refresh del token bastano requests e pynacl:
      # Pillow e Playwright (con Chromium) non servono e allungavano
      # il run di diversi minuti.
      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install requests pynacl

      - name: Esegui script per rinnovo Token
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          ONLY_REFRESH_TOKEN: "true"
        run: python juve_bot_espn.py
