name: Canva Token Keep-Alive

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: juve-canva-keepalive
  cancel-in-progress: true

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v6

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Per il solo refresh del token bastano requests e pynacl:
      # Pillow e Playwright (con Chromium) non servono e allungavano
      # il run di diversi minuti.
      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install requests pynacl

      - name: Esegui script per rinnovo Token
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          ONLY_REFRESH_TOKEN: "true"
        run: python -u juve_bot_espn.py

      - name: Pulisci la cronologia dei run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: "0"   # 0 = cancella TUTTI i run precedenti; resta visibile solo quello in corso
                      # (un run non puo' cancellare se' stesso mentre gira: limite di GitHub)
        run: |
          # Cancella i run COMPLETATI di questo stesso workflow,
          # tenendo solo gli ultimi $KEEP.
          gh api "repos/${{ github.repository }}/actions/workflows/canva_keep_alive.yml/runs?status=completed&per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .['"$KEEP"':] | .[].id' |
          while read -r RUN_ID; do
            echo "Elimino run $RUN_ID"
            gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$RUN_ID" || true
          done
          echo "Pulizia completata."
