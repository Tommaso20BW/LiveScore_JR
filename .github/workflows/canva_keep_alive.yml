name: Canva Token Keep-Alive

on:
  schedule:
    # Si avvia ogni lunedì alle 09:00 UTC (10:00 o 11:00 in Italia)
    - cron: '0 9 * * 1'

permissions:
  contents: write

concurrency:
  group: juve-canva-keepalive
  cancel-in-progress: true

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v5

      - name: Configura Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Installa librerie
        run: |
          python -m pip install --upgrade pip
          pip install requests pynacl

      - name: Esegui script per rinnovo Token
        env:
          # Passiamo solo quello che serve a Canva e GitHub per aggiornarsi
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          CANVA_REFRESH_TOKEN: ${{ secrets.CANVA_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python juve_bot.py
