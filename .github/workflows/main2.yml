name: Test Statistiche Bot
on:
  workflow_dispatch: # Ti permette di avviarlo manualmente dalla tab "Actions"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Installa dipendenze
        run: |
          pip install requests pynacl playwright
          playwright install chromium
          
      - name: Esegui Bot Simulato
        env:
          API_KEY: ${{ secrets.API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          # Aggiungi qui gli altri secret se servono al bot
        run: python simulator_bot.py
