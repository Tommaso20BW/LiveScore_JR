name: Partita Automatica Test
on:
  workflow_dispatch: # Permette di avviarlo a mano cliccando sul tasto in Actions

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice del repository
        uses: actions/checkout@v3
      
      - name: Configura Python ambiente
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Installa pacchetti e dipendenze di sistema
        run: |
          pip install requests playwright
          playwright install chromium
          
      - name: Esegui il simulatore corazzato
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: python simulator_bot.py
