<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            width: 500px;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .stat-container {
            margin-bottom: 20px;
        }
        .stat-labels {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-name {
            color: #aaa;
            font-size: 14px;
            text-transform: uppercase;
        }
        .bar-container {
            display: flex;
            height: 10px;
            background-color: #222;
            border-radius: 5px;
            overflow: hidden;
        }
        .bar-left {
            background-color: #e11d48; /* Rosso Juve/Brand */
            width: 50%;
            transition: width 0.5s;
        }
        .bar-right {
            background-color: #ffffff; /* Bianco Avversario */
            width: 50%;
            transition: width 0.5s;
            margin-left: auto;
        }
    </style>
</head>
<body>

    <div class="header" id="risultato">0 - 0</div>

    <div class="stat-container">
        <div class="stat-labels">
            <span id="j-sog">0</span>
            <span class="stat-name">Shots on Goal</span>
            <span id="a-sog">0</span>
        </div>
        <div class="bar-container">
            <div id="bar-l-sog" class="bar-left"></div>
            <div id="bar-r-sog" class="bar-right"></div>
        </div>
    </div>

    <div class="stat-container">
        <div class="stat-labels">
            <span id="j-ts">0</span>
            <span class="stat-name">Total Shots</span>
            <span id="a-ts">0</span>
        </div>
        <div class="bar-container">
            <div id="bar-l-ts" class="bar-left" style="width: 50%;"></div>
            <div id="bar-r-ts" class="bar-right" style="width: 50%;"></div>
        </div>
    </div>

    <div class="stat-container">
        <div class="stat-labels">
            <span id="j-pos">50</span>
            <span class="stat-name">Ball Possession</span>
            <span id="a-pos">50</span>
        </div>
        <div class="bar-container">
            <div id="bar-l-pos" class="bar-left" style="width: 50%;"></div>
            <div id="bar-r-pos" class="bar-right" style="width: 50%;"></div>
        </div>
    </div>

    <div class="stat-container">
        <div class="stat-labels">
            <span id="j-pas">80</span>
            <span class="stat-name">Passes %</span>
            <span id="a-pas">80</span>
        </div>
        <div class="bar-container">
            <div id="bar-l-pas" class="bar-left" style="width: 50%;"></div>
            <div id="bar-r-pas" class="bar-right" style="width: 50%;"></div>
        </div>
    </div>

</body>
</html>
