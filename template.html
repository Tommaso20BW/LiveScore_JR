<!DOCTYPE html>
<html lang="it">
<head>
    <style>
        body { background: #0b1318; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .stat-card { width: 500px; background: #151e24; border-radius: 20px; padding: 30px; }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo-box { width: 70px; height: 70px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 70%; height: 70%; object-fit: contain; }
        .stats-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px 20px; align-items: center; }
        .bar-container { grid-column: span 3; height: 4px; background: #263238; border-radius: 2px; display: flex; overflow: hidden; }
        .bar-l { background: #e11d48; height: 100%; } .bar-r { background: #fff; height: 100%; }
        .label { text-align: center; font-size: 12px; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="stat-card">
        <div class="match-header">
            <div class="logo-box"><img id="logo-l" src=""></div>
            <div id="score" style="font-size:30px; font-weight:900;">0-0</div>
            <div class="logo-box"><img id="logo-r" src=""></div>
        </div>
        <div class="stats-grid" id="stats-container"></div>
    </div>
</body>
</html>
