<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0b1318; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: start; padding: 0; margin: 0; width: 500px; height: auto; }
        .stat-card { width: 500px; background: #151e24; border-radius: 0px; padding: 25px; box-sizing: border-box; }
        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #263238; padding-bottom: 20px; }
        .logo-box { width: 65px; height: 65px; background: transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        .stats-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px 20px; align-items: center; }
        .stat-val-l { text-align: left; font-size: 16px; font-weight: 700; color: #fff; }
        .stat-val-r { text-align: right; font-size: 16px; font-weight: 700; color: #fff; }
        .bar-container { grid-column: span 3; height: 5px; background: #263238; border-radius: 3px; display: flex; margin-bottom: 12px; overflow: hidden; }
        .bar-l { background: #e11d48; height: 100%; transition: width 0.3s; } 
        .bar-r { background: #ffffff; height: 100%; transition: width 0.3s; }
        .label { text-align: center; font-size: 12px; color: #888; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="stat-card">
        <div class="match-header">
            <div class="logo-box"><img id="logo-l" src=""></div>
            <div id="score" style="font-size:32px; font-weight:900; letter-spacing: 1px;">0-0</div>
            <div class="logo-box"><img id="logo-r" src=""></div>
        </div>
        <div class="stats-grid" id="stats-container"></div>
    </div>

    <script>
        // Python sostituirà questo marker con il dizionario dei dati reali
        /* INJECT_DATA_HERE */

        if (typeof matchData !== 'undefined') {
            document.getElementById('logo-l').src = matchData.logo_l;
            document.getElementById('logo-r').src = matchData.logo_r;
            document.getElementById('score').innerText = matchData.score;

            const container = document.getElementById('stats-container');
            
            matchData.stats.forEach(s => {
                // Puliamo i valori da percentuali per fare i calcoli delle barre
                let valL = parseFloat(s.l) || 0;
                let valR = parseFloat(s.r) || 0;
                let total = valL + valR;
                
                let pctL = total > 0 ? (valL / total) * 100 : 50;
                let pctR = total > 0 ? (valR / total) * 100 : 50;

                // Generiamo la riga dei valori e la label
                container.innerHTML += `
                    <div class="stat-val-l">${s.l}</div>
                    <div class="label">${s.label}</div>
                    <div class="stat-val-r">${s.r}</div>
                    <div class="bar-container">
                        <div class="bar-l" style="width: ${pctL}%"></div>
                        <div class="bar-r" style="width: ${pctR}%"></div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
